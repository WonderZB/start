<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderSearch - AI & Web Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --bg-card: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #6b7280;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.1);
            --border: #2a2a2a;
            --shadow: rgba(0, 0, 0, 0.4);
            --shadow-strong: rgba(0, 0, 0, 0.6);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-bg: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient-bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px var(--shadow-strong);
            z-index: 100;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-1);
            opacity: 0.1;
            z-index: -1;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            text-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: translateY(-2px);
            text-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        /* Mode Switcher */
        .mode-switcher {
            display: flex;
            background: rgba(37, 37, 37, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 16px var(--shadow-strong);
        }

        .mode-btn {
            padding: 0.8rem 1.8rem;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-2);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
        }

        .mode-btn:hover::before {
            opacity: 0.1;
        }

        .mode-btn.active {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
            transform: scale(1.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .mode-btn.active::before {
            opacity: 0.15;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Content Areas */
        .content-area {
            flex: 1;
            display: none;
            flex-direction: column;
        }

        .content-area.active {
            display: flex;
        }

        /* AI Content */
        .ai-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            margin: 1rem;
            overflow: hidden;
            box-shadow: 0 8px 32px var(--shadow);
            border: 1px solid var(--border);
        }

        .ai-header {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-title {
            font-weight: 600;
            color: var(--text-primary);
        }

        .ai-selector {
            display: flex;
            gap: 0.5rem;
        }

        .ai-option {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .ai-option:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .ai-option.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .ai-iframe {
            flex: 1;
            border: none;
            background: white;
        }

        /* Search Content */
        .search-content {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .search-input-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px var(--shadow);
        }

        .search-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem;
        }

        .search-results::-webkit-scrollbar {
            width: 6px;
        }

        .search-results::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        .search-results::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .result-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .result-item:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .result-url {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-bottom: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        .result-description {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .mode-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .ai-content, .search-input-container {
                margin: 0.5rem;
                border-radius: 12px;
            }

            .result-item {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">WonderSearch</div>
        <div class="mode-switcher">
            <button class="mode-btn active" id="ai-mode" onclick="switchMode('ai')">AI</button>
            <button class="mode-btn" id="search-mode" onclick="switchMode('search')">Search</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- AI Content Area -->
        <div class="content-area active" id="ai-content">
            <div class="ai-content">
                <div class="ai-header">
                    <div class="ai-title">AI Assistant</div>
                    <div class="ai-selector">
                        <div class="ai-option active" onclick="switchAI('perplexity')">Perplexity</div>
                        <div class="ai-option" onclick="switchAI('poe')">Poe</div>
                        <div class="ai-option" onclick="switchAI('characterai')">Character.AI</div>
                        <div class="ai-option" onclick="switchAI('flowgpt')">FlowGPT</div>
                    </div>
                </div>
                <iframe class="ai-iframe" id="ai-iframe" src="https://www.perplexity.ai/"></iframe>
            </div>
        </div>

        <!-- Search Content Area -->
        <div class="content-area" id="search-content">
            <div class="search-content">
                <div class="search-input-container">
                    <input 
                        type="text" 
                        class="search-input" 
                        id="search-input" 
                        placeholder="Search the web..."
                        onkeypress="handleSearchKeyPress(event)"
                    >
                </div>
                <div class="search-results" id="search-results">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Ready to search</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Global state
        let currentMode = 'ai';
        let currentAI = 'perplexity';
        let searchTimeout = null;

        // AI Sites - more embeddable alternatives
        const aiSites = {
            perplexity: 'https://www.perplexity.ai/',
            poe: 'https://poe.com/',
            characterai: 'https://character.ai/',
            flowgpt: 'https://flowgpt.com/',
            youcom: 'https://you.com/'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set up keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    switchMode(currentMode === 'ai' ? 'search' : 'ai');
                }
            });

            // Focus search input when in search mode
            document.getElementById('search-input').addEventListener('focus', function() {
                if (currentMode !== 'search') {
                    switchMode('search');
                }
            });
        });

        // Mode switching
        function switchMode(mode) {
            if (mode === currentMode) return;
            
            console.log(`Switching to ${mode} mode`);
            
            // Update buttons
            document.getElementById('ai-mode').classList.toggle('active', mode === 'ai');
            document.getElementById('search-mode').classList.toggle('active', mode === 'search');
            
            // Update content areas
            document.getElementById('ai-content').classList.toggle('active', mode === 'ai');
            document.getElementById('search-content').classList.toggle('active', mode === 'search');
            
            currentMode = mode;
            
            // Focus appropriate element
            if (mode === 'search') {
                setTimeout(() => {
                    document.getElementById('search-input').focus();
                }, 100);
            }
        }

        // AI switching
        function switchAI(ai) {
            if (ai === currentAI) return;
            
            console.log(`Switching to ${ai}`);
            
            // Update buttons
            document.querySelectorAll('.ai-option').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update iframe
            const iframe = document.getElementById('ai-iframe');
            iframe.src = aiSites[ai];
            
            currentAI = ai;
        }

        // Search functionality
        function handleSearchKeyPress(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }

        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            
            console.log(`Searching for: ${query}`);
            
            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Searching...</p>
                </div>
            `;
            
            try {
                // Use DuckDuckGo instant answer API (no CORS issues)
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&pretty=1`);
                const data = await response.json();
                
                displaySearchResults(data, query);
                
            } catch (error) {
                console.error('Search failed:', error);
                resultsContainer.innerHTML = `
                    <div class="loading">
                        <p>Search failed. Please try again.</p>
                    </div>
                `;
            }
        }

        function displaySearchResults(data, query) {
            const resultsContainer = document.getElementById('search-results');
            const results = [];
            
            // Abstract (instant answer)
            if (data.Abstract) {
                results.push({
                    title: data.Heading || 'Instant Answer',
                    url: data.AbstractURL || '',
                    description: data.Abstract,
                    type: 'instant'
                });
            }
            
            // Related topics
            if (data.RelatedTopics && Array.isArray(data.RelatedTopics)) {
                data.RelatedTopics.slice(0, 8).forEach(topic => {
                    if (topic.Text && topic.FirstURL) {
                        results.push({
                            title: topic.Text.split(' - ')[0] || topic.Text,
                            url: topic.FirstURL,
                            description: topic.Text,
                            type: 'web'
                        });
                    }
                });
            }
            
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="loading">
                        <p>No results found for "${query}"</p>
                    </div>
                `;
                return;
            }
            
            // Render results
            const resultsHTML = results.map(result => `
                <div class="result-item" onclick="openResult('${result.url}')">
                    <div class="result-title">${result.title}</div>
                    ${result.url ? `<div class="result-url">${result.url}</div>` : ''}
                    <div class="result-description">${result.description}</div>
                </div>
            `).join('');
            
            resultsContainer.innerHTML = resultsHTML;
        }

        function openResult(url) {
            if (url) {
                window.open(url, '_blank', 'noopener,noreferrer');
            }
        }
    </script>
</body>
</html>
